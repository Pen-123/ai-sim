<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Simulations | Realistic Pistol Range</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background: #0b1a1f;
            cursor: crosshair;
        }
        canvas {
            display: block;
            background: radial-gradient(circle at 30% 40%, #1e3a3f, #071013);
            cursor: crosshair;
        }
        .ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1.4rem;
            letter-spacing: 1px;
            pointer-events: none;
            z-index: 10;
            border-right: 4px solid gold;
        }
        .score {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 2rem;
            font-weight: bold;
            color: #ffd966;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
        }
        .recoil-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,200,100,0) 30%, rgba(255,100,30,0.3));
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.05s;
            z-index: 15;
        }
        a {
            position: absolute;
            top: 20px;
            left: 20px;
            color: cyan;
            background: #000000aa;
            padding: 6px 16px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            z-index: 20;
            backdrop-filter: blur(4px);
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #00000099;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #ccc;
        }
        button {
            background: #2c4c5c;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
<a href="index.html">← BACK</a>
<div class="score">🎯 SCORE: <span id="scoreVal">0</span></div>
<div class="ui">🔫 REALISTIC PISTOL · Click to shoot</div>
<div class="instruction">🎯 moving target | headshots = +20 | body +10 | recoil shake</div>
<div id="recoilOverlay" class="recoil-effect"></div>
<canvas id="pistolCanvas"></canvas>
<script>
    const canvas = document.getElementById('pistolCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    let score = 0;
    let targets = [];
    let recoilActive = false;
    let recoilOffset = { x: 0, y: 0 };
    let crosshair = { x: width/2, y: height/2 };

    class Target {
        constructor(x, y, radius, type) {
            this.x = x;
            this.y = y;
            this.radius = radius;
            this.type = type; // 'head' or 'body'
            this.vx = (Math.random() - 0.5) * 1.2;
            this.vy = (Math.random() - 0.5) * 1.1;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x - this.radius < 0 || this.x + this.radius > width) this.vx *= -0.98;
            if (this.y - this.radius < 0 || this.y + this.radius > height) this.vy *= -0.98;
            this.x = Math.min(Math.max(this.x, this.radius), width - this.radius);
            this.y = Math.min(Math.max(this.y, this.radius), height - this.radius);
        }
        draw() {
            ctx.shadowBlur = 8;
            if (this.type === 'head') {
                ctx.fillStyle = '#d64531';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = `${this.radius}px monospace`;
                ctx.fillText("🎯", this.x-12, this.y+8);
            } else {
                ctx.fillStyle = '#7a5b4b';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.radius, this.radius*1.2, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#a06e4b';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius-4, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }
        hit(px, py) {
            const dx = px - this.x;
            const dy = py - this.y;
            const dist = Math.hypot(dx, dy);
            return dist < this.radius;
        }
    }

    function spawnTarget() {
        const margin = 70;
        const x = margin + Math.random() * (width - margin*2);
        const y = margin + Math.random() * (height - margin*2);
        const type = Math.random() < 0.4 ? 'head' : 'body';
        const radius = type === 'head' ? 28 : 38;
        targets.push(new Target(x, y, radius, type));
        if (targets.length > 5) targets.shift();
    }

    function updateCrosshair(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        crosshair.x = (clientX - rect.left) * scaleX;
        crosshair.y = (clientY - rect.top) * scaleY;
    }

    function shoot(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clickX, clickY;
        if (e.touches) {
            clickX = (e.touches[0].clientX - rect.left) * scaleX;
            clickY = (e.touches[0].clientY - rect.top) * scaleY;
        } else {
            clickX = (e.clientX - rect.left) * scaleX;
            clickY = (e.clientY - rect.top) * scaleY;
        }

        // recoil visual
        recoilActive = true;
        const overlay = document.getElementById('recoilOverlay');
        overlay.style.opacity = '0.7';
        setTimeout(() => { overlay.style.opacity = '0'; }, 100);
        // shake effect (camera offset)
        recoilOffset = { x: (Math.random() - 0.5)*6, y: (Math.random() - 0.5)*4 };
        setTimeout(() => { recoilOffset = { x: 0, y: 0 }; }, 120);

        let hitSomething = false;
        for (let i = 0; i < targets.length; i++) {
            const t = targets[i];
            if (t.hit(clickX, clickY)) {
                if (t.type === 'head') score += 20;
                else score += 10;
                targets.splice(i,1);
                hitSomething = true;
                document.getElementById('scoreVal').innerText = score;
                break;
            }
        }
        if (!hitSomething) {
            // miss penalty
            score = Math.max(0, score - 2);
            document.getElementById('scoreVal').innerText = score;
        }
        // always spawn a new target after shot for dynamic feel
        spawnTarget();
    }

    function drawGunSight() {
        ctx.save();
        ctx.translate(recoilOffset.x, recoilOffset.y);
        ctx.beginPath();
        ctx.strokeStyle = '#ffffffdd';
        ctx.lineWidth = 2;
        const cx = crosshair.x;
        const cy = crosshair.y;
        ctx.moveTo(cx - 18, cy);
        ctx.lineTo(cx - 8, cy);
        ctx.moveTo(cx + 8, cy);
        ctx.lineTo(cx + 18, cy);
        ctx.moveTo(cx, cy - 18);
        ctx.lineTo(cx, cy - 8);
        ctx.moveTo(cx, cy + 8);
        ctx.lineTo(cx, cy + 18);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, 6, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255,80,40,0.8)';
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, 3, 0, Math.PI*2);
        ctx.fillStyle = '#ff3333aa';
        ctx.fill();
        ctx.restore();
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);
        ctx.save();
        ctx.translate(recoilOffset.x, recoilOffset.y);
        // draw targets
        for (let t of targets) {
            t.update();
            t.draw();
        }
        ctx.restore();
        drawGunSight();
        requestAnimationFrame(animate);
    }

    function resizeAndInit() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        targets = [];
        for (let i = 0; i < 3; i++) spawnTarget();
        crosshair = { x: width/2, y: height/2 };
    }

    canvas.addEventListener('mousemove', updateCrosshair);
    canvas.addEventListener('click', shoot);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); updateCrosshair(e); });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(e); });

    window.addEventListener('resize', () => { resizeAndInit(); });
    resizeAndInit();
    setInterval(() => {
        if (targets.length < 4) spawnTarget();
    }, 1800);
    animate();
</script>
</body>
</html>
