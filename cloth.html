<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Simulations | Hyper-Cloth Physics</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui;
            background: #050b12;
        }
        canvas {
            display: block;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            border-left: 4px solid #ff66cc;
        }
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 40px;
            display: flex;
            gap: 15px;
            z-index: 20;
            pointer-events: auto;
        }
        button {
            background: #2c3e44;
            border: none;
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            background: #ff66cc;
            color: black;
            box-shadow: 0 0 12px #ff66cc;
        }
        a {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff66cc;
            text-decoration: none;
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 20;
            backdrop-filter: blur(4px);
        }
        a:hover { background: #ff66cc; color: black; }
    </style>
</head>
<body>
<a href="index.html">← BACK HOME</a>
<div class="controls">
    <button id="windBtn">💨 WIND: OFF</button>
    <button id="resetBtn">🔄 RESET</button>
</div>
<div class="info">
    ✨ DRAG any point | Realistic mass-spring cloth | Wind toggle | Satisfying ripples
</div>
<canvas id="clothCanvas"></canvas>
<script>
    const canvas = document.getElementById('clothCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let points = [];
    let springs = [];
    let windActive = false;
    let wind = { x: 0.6, y: 0.15 };
    let mouse = { x: null, y: null, radius: 40, dragging: false, dragPoint: null };
    let lastTimestamp = 0;

    const COLS = 45;
    const ROWS = 32;
    const SPACING = 12;
    const START_X = (window.innerWidth / 2) - (COLS * SPACING) / 2;
    const START_Y = 70;

    class Point {
        constructor(x, y, fixed = false) {
            this.x = x; this.y = y;
            this.oldX = x; this.oldY = y;
            this.fixed = fixed;
            this.accX = 0; this.accY = 0;
        }
        update() {
            if (this.fixed) return;
            let vx = this.x - this.oldX;
            let vy = this.y - this.oldY;
            this.oldX = this.x;
            this.oldY = this.y;
            this.x += vx + this.accX;
            this.y += vy + this.accY;
            this.accX = 0; this.accY = 0;
            // gravity
            this.y += 0.45;
        }
        constrain() {
            if (this.fixed) return;
            this.x = Math.min(Math.max(this.x, 5), width - 5);
            this.y = Math.min(Math.max(this.y, 5), height - 5);
        }
        addForce(fx, fy) {
            this.accX += fx;
            this.accY += fy;
        }
    }

    function initCloth() {
        points = [];
        springs = [];
        const startX = (width / 2) - (COLS * SPACING) / 2;
        const startY = 70;
        for (let i = 0; i <= COLS; i++) {
            points[i] = [];
            for (let j = 0; j <= ROWS; j++) {
                const fixed = (j === 0);
                points[i][j] = new Point(startX + i * SPACING, startY + j * SPACING, fixed);
            }
        }
        // structural, shear, bend springs
        for (let i = 0; i <= COLS; i++) {
            for (let j = 0; j <= ROWS; j++) {
                if (i < COLS) {
                    springs.push({ p1: points[i][j], p2: points[i+1][j], rest: SPACING, stiff: 0.28 });
                }
                if (j < ROWS) {
                    springs.push({ p1: points[i][j], p2: points[i][j+1], rest: SPACING, stiff: 0.28 });
                }
                if (i < COLS && j < ROWS) {
                    springs.push({ p1: points[i][j], p2: points[i+1][j+1], rest: SPACING * 1.414, stiff: 0.2 });
                    springs.push({ p1: points[i+1][j], p2: points[i][j+1], rest: SPACING * 1.414, stiff: 0.2 });
                }
                if (i < COLS - 1) {
                    springs.push({ p1: points[i][j], p2: points[i+2][j], rest: SPACING * 2, stiff: 0.12 });
                }
                if (j < ROWS - 1) {
                    springs.push({ p1: points[i][j], p2: points[i][j+2], rest: SPACING * 2, stiff: 0.12 });
                }
            }
        }
    }

    function solveSprings() {
        for (let s of springs) {
            const dx = s.p1.x - s.p2.x;
            const dy = s.p1.y - s.p2.y;
            const dist = Math.hypot(dx, dy);
            const diff = (dist - s.rest) / dist;
            const force = diff * s.stiff;
            const fx = dx * force;
            const fy = dy * force;
            if (!s.p1.fixed) { s.p1.x -= fx; s.p1.y -= fy; }
            if (!s.p2.fixed) { s.p2.x += fx; s.p2.y += fy; }
        }
    }

    function applyWind() {
        if (!windActive) return;
        for (let i = 0; i <= COLS; i++) {
            for (let j = 1; j <= ROWS; j++) {
                const p = points[i][j];
                p.addForce(wind.x * 0.3, wind.y * 0.12);
            }
        }
    }

    function handleDrag() {
        if (!mouse.dragging || mouse.x === null) return;
        let bestDist = mouse.radius * 1.5;
        let closest = null;
        for (let i = 0; i <= COLS; i++) {
            for (let j = 0; j <= ROWS; j++) {
                const p = points[i][j];
                const dx = p.x - mouse.x;
                const dy = p.y - mouse.y;
                const dist = Math.hypot(dx, dy);
                if (dist < bestDist) {
                    bestDist = dist;
                    closest = p;
                }
            }
        }
        if (closest) {
            closest.x = mouse.x;
            closest.y = mouse.y;
            closest.oldX = mouse.x;
            closest.oldY = mouse.y;
        }
    }

    function update() {
        // Verlet integration
        for (let i = 0; i <= COLS; i++) {
            for (let j = 0; j <= ROWS; j++) {
                points[i][j].update();
            }
        }
        // solve springs
        for (let iter = 0; iter < 6; iter++) {
            solveSprings();
            for (let i = 0; i <= COLS; i++) {
                for (let j = 0; j <= ROWS; j++) {
                    points[i][j].constrain();
                }
            }
        }
        applyWind();
        handleDrag();
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        // Background gradient
        const grad = ctx.createLinearGradient(0, 0, width, height);
        grad.addColorStop(0, '#0a1428');
        grad.addColorStop(1, '#03060c');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);

        // Draw springs with gradient based on tension
        for (let s of springs) {
            const dx = s.p1.x - s.p2.x;
            const dy = s.p1.y - s.p2.y;
            const stretch = Math.abs(Math.hypot(dx, dy) - s.rest) / s.rest;
            const intensity = Math.min(1, stretch * 1.5);
            ctx.beginPath();
            ctx.moveTo(s.p1.x, s.p1.y);
            ctx.lineTo(s.p2.x, s.p2.y);
            ctx.strokeStyle = `hsl(${200 - intensity * 100}, 80%, 60%)`;
            ctx.lineWidth = 1.2 + intensity * 1.5;
            ctx.stroke();
        }

        // Draw points with glow
        for (let i = 0; i <= COLS; i++) {
            for (let j = 0; j <= ROWS; j++) {
                const p = points[i][j];
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2.4, 0, Math.PI * 2);
                ctx.fillStyle = p.fixed ? '#ffaa88' : '#80d0ff';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#80d0ff';
                ctx.fill();
            }
        }
        ctx.shadowBlur = 0;

        // Mouse interaction halo
        if (mouse.dragging && mouse.x) {
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, mouse.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,100,200,0.2)';
            ctx.fill();
        }
    }

    function animate() {
        update();
        draw();
        requestAnimationFrame(animate);
    }

    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        initCloth();
    }

    // Event handlers
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function onMouseDown(e) {
        e.preventDefault();
        const pos = getMousePos(e);
        mouse.x = pos.x;
        mouse.y = pos.y;
        mouse.dragging = true;
    }
    function onMouseMove(e) {
        if (!mouse.dragging) return;
        const pos = getMousePos(e);
        mouse.x = pos.x;
        mouse.y = pos.y;
    }
    function onMouseUp() {
        mouse.dragging = false;
    }
    canvas.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    canvas.addEventListener('touchstart', onMouseDown);
    window.addEventListener('touchmove', onMouseMove);
    window.addEventListener('touchend', onMouseUp);

    document.getElementById('windBtn').addEventListener('click', () => {
        windActive = !windActive;
        document.getElementById('windBtn').innerHTML = windActive ? "💨 WIND: ON" : "💨 WIND: OFF";
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
        initCloth();
    });

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    animate();
</script>
</body>
</html>
